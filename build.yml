name: Build Windows EXE

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # Added pywebview to ensure it is installed for the build
      - name: Install dependencies
        run: pip install pyinstaller pywebview
      
      - name: Build EXE (with HTML bundled inside)
        run: |
          pyinstaller --onefile --noconsole --name "Open_Piping_Tool" --add-data "piping_loading_tool.html;." launcher.py
      
      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Open_Piping_Tool_Executable
          path: dist/Open_Piping_Tool.exe
