name: Build Windows EXE

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # Install both dependencies required for the new standalone window logic
      - name: Install dependencies
        run: pip install pyinstaller pywebview
      
      # Build the EXE bundling the HTML file
      - run: pyinstaller --onefile --noconsole --name "Open_Piping_Tool" --add-data "piping_loading_tool.html;." launcher.py
      
      - uses: actions/upload-artifact@v4
        with:
          name: Open_Piping_Tool_Executable
          path: dist/Open_Piping_Tool.exe
